<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>免費圖片/PDF 轉文字</title>
<script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/pdfjs-dist@3.11.174/build/pdf.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&family=Space+Mono:wght@700&display=swap');
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0e0e10;--surface:#18181c;--surface2:#222228;
  --border:rgba(255,255,255,0.08);--border2:rgba(255,255,255,0.15);
  --accent:#7c6af7;--accent2:#a695ff;
  --text:#f0eeff;--muted:#8886a0;--success:#4ade80;
  --r:14px;
}
body{background:var(--bg);color:var(--text);font-family:'Noto Sans TC',sans-serif;min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:2rem 1rem 4rem}
header{text-align:center;margin-bottom:2.5rem}
header h1{font-family:'Space Mono',monospace;font-size:clamp(1.4rem,5vw,2.2rem);font-weight:700;letter-spacing:-0.03em;background:linear-gradient(135deg,#a695ff,#7c6af7,#5b4fd4);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
header p{margin-top:.5rem;color:var(--muted);font-size:.9rem}
.badge{display:inline-block;background:rgba(74,222,128,.12);border:1px solid rgba(74,222,128,.3);color:#4ade80;font-size:.72rem;padding:2px 10px;border-radius:20px;margin-top:.5rem;font-family:'Space Mono',monospace}
.card{width:100%;max-width:700px;background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:1.5rem;margin-bottom:1.25rem}
.card-title{font-size:.72rem;font-family:'Space Mono',monospace;color:var(--accent2);letter-spacing:.1em;text-transform:uppercase;margin-bottom:1rem}

/* Upload zone */
.upload-zone{border:1.5px dashed var(--border2);border-radius:10px;padding:2.2rem 1rem;text-align:center;cursor:pointer;transition:border-color .2s,background .2s;position:relative;overflow:hidden}
.upload-zone:hover,.upload-zone.drag-over{border-color:var(--accent);background:rgba(124,106,247,.06)}
.upload-zone input[type=file]{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%}
.upload-icon{width:48px;height:48px;margin:0 auto .75rem;background:rgba(124,106,247,.15);border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:22px}
.upload-label{font-size:.95rem;color:var(--text);font-weight:500}
.upload-sub{font-size:.8rem;color:var(--muted);margin-top:.3rem}

/* Buttons */
.btn-row{display:flex;gap:.75rem;margin-top:1rem;flex-wrap:wrap}
button{font-family:'Noto Sans TC',sans-serif;font-size:.9rem;padding:.6rem 1.2rem;border-radius:8px;border:1px solid var(--border2);background:var(--surface2);color:var(--text);cursor:pointer;transition:background .15s,border-color .15s,transform .1s;display:flex;align-items:center;gap:.4rem}
button:hover{background:rgba(255,255,255,.08);border-color:var(--accent)}
button:active{transform:scale(.97)}
button.primary{background:var(--accent);border-color:var(--accent);color:#fff;font-weight:500}
button.primary:hover{background:var(--accent2);border-color:var(--accent2)}
button:disabled{opacity:.4;cursor:not-allowed;pointer-events:none}

/* Preview */
#preview-wrap{display:none;margin-top:1rem;position:relative}
#preview-img{width:100%;max-height:280px;object-fit:contain;border-radius:8px;border:1px solid var(--border);background:#111;display:block}
#clear-btn{position:absolute;top:8px;right:8px;width:28px;height:28px;padding:0;background:rgba(0,0,0,.6);border:1px solid var(--border2);border-radius:50%;font-size:14px;display:flex;align-items:center;justify-content:center}

/* PDF pages */
#pdf-pages{display:none;margin-top:1rem}
.pdf-page-wrap{margin-bottom:.75rem;border:1px solid var(--border);border-radius:8px;overflow:hidden;position:relative}
.pdf-page-wrap canvas{width:100%;display:block}
.page-label{font-size:.72rem;font-family:'Space Mono',monospace;color:var(--muted);padding:4px 8px;background:var(--surface2)}

/* Language select */
select{font-family:'Noto Sans TC',sans-serif;font-size:.88rem;padding:.5rem .75rem;background:var(--surface2);border:1px solid var(--border2);border-radius:8px;color:var(--text);cursor:pointer;outline:none;transition:border-color .15s}
select:focus{border-color:var(--accent)}
.lang-row{display:flex;align-items:center;gap:.75rem;margin-top:.75rem;flex-wrap:wrap}
.lang-row label{font-size:.85rem;color:var(--muted)}

/* Progress */
#progress-wrap{display:none;margin-top:1rem}
.progress-bar-bg{background:var(--surface2);border-radius:20px;height:6px;overflow:hidden}
.progress-bar{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent2));border-radius:20px;transition:width .3s;width:0%}
.progress-label{font-size:.78rem;color:var(--muted);margin-top:.4rem;font-family:'Space Mono',monospace}

/* Status */
#status{font-size:.85rem;padding:.5rem .75rem;border-radius:8px;background:rgba(124,106,247,.1);border:1px solid rgba(124,106,247,.25);color:var(--accent2);display:none;align-items:center;gap:.5rem;margin-top:.75rem}
#status.show{display:flex}
#status.error{background:rgba(239,68,68,.1);border-color:rgba(239,68,68,.3);color:#f87171}
.spinner{width:14px;height:14px;border:2px solid rgba(166,149,255,.3);border-top-color:var(--accent2);border-radius:50%;animation:spin .7s linear infinite;flex-shrink:0}
@keyframes spin{to{transform:rotate(360deg)}}

/* Result */
#result-card{display:none}
.result-tabs{display:flex;gap:.5rem;margin-bottom:.75rem;flex-wrap:wrap}
.tab-btn{font-size:.78rem;padding:.35rem .8rem;border-radius:20px;background:var(--surface2);border:1px solid var(--border2);color:var(--muted);cursor:pointer;transition:all .15s}
.tab-btn.active{background:rgba(124,106,247,.2);border-color:var(--accent);color:var(--accent2)}
#result-text{font-size:.93rem;line-height:1.9;white-space:pre-wrap;word-break:break-word;color:var(--text);background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:1rem;max-height:420px;overflow-y:auto;min-height:80px}
#result-text::-webkit-scrollbar{width:4px}
#result-text::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}
.copy-row{display:flex;align-items:center;justify-content:space-between;margin-top:.75rem;flex-wrap:wrap;gap:.5rem}
.char-count{font-size:.78rem;color:var(--muted);font-family:'Space Mono',monospace}
#copy-btn{background:rgba(74,222,128,.12);border-color:rgba(74,222,128,.3);color:var(--success)}
#copy-btn:hover{background:rgba(74,222,128,.2)}

/* Camera modal */
#camera-modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.88);z-index:999;align-items:center;justify-content:center;flex-direction:column;gap:1rem;padding:1rem}
#camera-modal.open{display:flex}
#camera-video{width:100%;max-width:500px;border-radius:12px;background:#000;display:block}
.cam-btns{display:flex;gap:.75rem}

/* Note box */
.note{background:rgba(124,106,247,.07);border:1px solid rgba(124,106,247,.18);border-radius:10px;padding:.75rem 1rem;font-size:.8rem;color:var(--muted);line-height:1.6;margin-top:.75rem}
.note strong{color:var(--accent2)}
</style>
</head>
<body>

<header>
  <h1>圖片 / PDF → 文字</h1>
  <p>使用 Tesseract.js 在本機辨識，完全免費</p>
  <div class="badge">✓ 免費　✓ 離線可用　✓ 不傳任何資料</div>
</header>

<!-- Upload -->
<div class="card">
  <div class="card-title">📁 選擇圖片或 PDF</div>
  <div class="upload-zone" id="drop-zone">
    <input type="file" id="file-input" accept="image/*,.pdf" />
    <div class="upload-icon">📄</div>
    <div class="upload-label">點擊選擇，或拖曳到此處</div>
    <div class="upload-sub">支援 JPG、PNG、WEBP、GIF、PDF</div>
  </div>

  <div class="lang-row">
    <label>辨識語言：</label>
    <select id="lang-select">
      <option value="chi_tra+eng">繁體中文 + 英文</option>
      <option value="chi_sim+eng">簡體中文 + 英文</option>
      <option value="chi_tra+chi_sim+eng">繁體 + 簡體 + 英文</option>
      <option value="eng">英文only</option>
      <option value="jpn+eng">日文 + 英文</option>
      <option value="kor+eng">韓文 + 英文</option>
    </select>
  </div>

  <div class="btn-row">
    <button onclick="openCamera()">📸 相機拍照</button>
    <button class="primary" id="convert-btn" onclick="startOCR()" disabled>✨ 開始辨識</button>
  </div>

  <div id="preview-wrap">
    <img id="preview-img" src="" alt="預覽" />
    <button id="clear-btn" onclick="clearAll()">✕</button>
  </div>
  <div id="pdf-pages"></div>

  <div id="progress-wrap">
    <div class="progress-bar-bg"><div class="progress-bar" id="progress-bar"></div></div>
    <div class="progress-label" id="progress-label">準備中…</div>
  </div>
  <div id="status"></div>

  <div class="note">
    <strong>說明：</strong>Tesseract.js 在你的瀏覽器本機執行 OCR，第一次使用會下載語言包（約 10–30MB），之後會快取。準確率對清晰印刷文字佳，手寫或模糊效果較差。
  </div>
</div>

<!-- Result -->
<div class="card" id="result-card">
  <div class="card-title">📝 辨識結果</div>
  <div id="result-text"></div>
  <div class="copy-row">
    <span class="char-count" id="char-count"></span>
    <div style="display:flex;gap:.5rem">
      <button id="download-btn" onclick="downloadTxt()" style="font-size:.82rem;padding:.5rem .9rem;">💾 下載 .txt</button>
      <button id="copy-btn" onclick="copyText()">📋 複製全部</button>
    </div>
  </div>
</div>

<!-- Camera modal -->
<div id="camera-modal">
  <video id="camera-video" autoplay playsinline></video>
  <div class="cam-btns">
    <button class="primary" onclick="takePhoto()">📸 拍照</button>
    <button onclick="closeCamera()">✕ 關閉</button>
  </div>
</div>

<canvas id="canvas" style="display:none"></canvas>

<script>
pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdn.jsdelivr.net/npm/pdfjs-dist@3.11.174/build/pdf.worker.min.js';

let currentFile = null;
let isPDF = false;
let pdfDoc = null;
let cameraStream = null;

const fileInput = document.getElementById('file-input');
const dropZone = document.getElementById('drop-zone');
const previewWrap = document.getElementById('preview-wrap');
const previewImg = document.getElementById('preview-img');
const pdfPagesEl = document.getElementById('pdf-pages');
const convertBtn = document.getElementById('convert-btn');
const statusEl = document.getElementById('status');
const progressWrap = document.getElementById('progress-wrap');
const progressBar = document.getElementById('progress-bar');
const progressLabel = document.getElementById('progress-label');
const resultCard = document.getElementById('result-card');
const resultText = document.getElementById('result-text');
const charCount = document.getElementById('char-count');

// Drag & drop
dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('drag-over'); });
dropZone.addEventListener('dragleave', () => dropZone.classList.remove('drag-over'));
dropZone.addEventListener('drop', e => { e.preventDefault(); dropZone.classList.remove('drag-over'); const f = e.dataTransfer.files[0]; if(f) handleFile(f); });
fileInput.addEventListener('change', () => { if(fileInput.files[0]) handleFile(fileInput.files[0]); });
document.addEventListener('paste', e => { const item = [...e.clipboardData.items].find(i => i.type.startsWith('image/')); if(item) handleFile(item.getAsFile()); });

async function handleFile(file) {
  clearAll(false);
  currentFile = file;
  isPDF = file.type === 'application/pdf' || file.name.toLowerCase().endsWith('.pdf');
  hideStatus(); hideProgress();
  resultCard.style.display = 'none';

  if (isPDF) {
    pdfPagesEl.style.display = 'block';
    pdfPagesEl.innerHTML = '<div style="color:var(--muted);font-size:.85rem;padding:.5rem 0">載入 PDF…</div>';
    const ab = await file.arrayBuffer();
    pdfDoc = await pdfjsLib.getDocument({ data: ab }).promise;
    pdfPagesEl.innerHTML = '';
    for (let i = 1; i <= pdfDoc.numPages; i++) {
      const page = await pdfDoc.getPage(i);
      const vp = page.getViewport({ scale: 1.5 });
      const c = document.createElement('canvas');
      c.width = vp.width; c.height = vp.height;
      await page.render({ canvasContext: c.getContext('2d'), viewport: vp }).promise;
      const wrap = document.createElement('div');
      wrap.className = 'pdf-page-wrap';
      const lbl = document.createElement('div');
      lbl.className = 'page-label';
      lbl.textContent = `第 ${i} / ${pdfDoc.numPages} 頁`;
      wrap.appendChild(lbl); wrap.appendChild(c);
      pdfPagesEl.appendChild(wrap);
    }
  } else {
    const url = URL.createObjectURL(file);
    previewImg.src = url;
    previewWrap.style.display = 'block';
  }
  convertBtn.disabled = false;
}

function clearAll(resetInput = true) {
  currentFile = null; isPDF = false; pdfDoc = null;
  previewWrap.style.display = 'none';
  previewImg.src = '';
  pdfPagesEl.style.display = 'none';
  pdfPagesEl.innerHTML = '';
  convertBtn.disabled = true;
  if (resetInput) fileInput.value = '';
  resultCard.style.display = 'none';
  resultText.textContent = '';
  hideStatus(); hideProgress();
}

function hideStatus() { statusEl.className = ''; statusEl.innerHTML = ''; }
function hideProgress() { progressWrap.style.display = 'none'; progressBar.style.width = '0%'; }
function showStatus(msg, isError=false) {
  statusEl.className = 'show' + (isError ? ' error' : '');
  statusEl.innerHTML = `<span>${msg}</span>`;
}
function showProgress(pct, label) {
  progressWrap.style.display = 'block';
  progressBar.style.width = pct + '%';
  progressLabel.textContent = label;
}

async function startOCR() {
  if (!currentFile) return;
  convertBtn.disabled = true;
  resultCard.style.display = 'none';
  hideStatus();
  const lang = document.getElementById('lang-select').value;
  let fullText = '';

  try {
    if (isPDF) {
      const canvases = pdfPagesEl.querySelectorAll('canvas');
      const total = canvases.length;
      for (let i = 0; i < total; i++) {
        showProgress(Math.round((i / total) * 100), `辨識第 ${i+1} / ${total} 頁…`);
        const blob = await new Promise(res => canvases[i].toBlob(res, 'image/png'));
        const result = await Tesseract.recognize(blob, lang, {
          logger: m => { if(m.status === 'recognizing text') { const p = Math.round((i/total)*100 + m.progress/total*100); showProgress(p, `辨識第 ${i+1} / ${total} 頁… ${Math.round(m.progress*100)}%`); } }
        });
        if (i > 0) fullText += '\n\n---\n\n';
        fullText += `【第 ${i+1} 頁】\n` + result.data.text.trim();
      }
    } else {
      showProgress(0, '準備辨識…');
      const result = await Tesseract.recognize(currentFile, lang, {
        logger: m => { if(m.status === 'recognizing text') showProgress(Math.round(m.progress*100), `辨識中… ${Math.round(m.progress*100)}%`); }
      });
      fullText = result.data.text.trim();
    }

    showProgress(100, '辨識完成！');
    setTimeout(hideProgress, 1000);

    resultText.textContent = fullText || '（未辨識到任何文字）';
    charCount.textContent = `共 ${fullText.length} 字`;
    resultCard.style.display = 'block';
    resultCard.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    document.getElementById('copy-btn').textContent = '📋 複製全部';
  } catch(e) {
    hideProgress();
    showStatus('辨識失敗：' + e.message, true);
  } finally {
    convertBtn.disabled = false;
  }
}

async function copyText() {
  const text = resultText.textContent;
  if (!text) return;
  try { await navigator.clipboard.writeText(text); }
  catch { const ta = document.createElement('textarea'); ta.value = text; ta.style.cssText='position:fixed;opacity:0'; document.body.appendChild(ta); ta.select(); document.execCommand('copy'); document.body.removeChild(ta); }
  const btn = document.getElementById('copy-btn');
  btn.textContent = '✅ 已複製！';
  setTimeout(() => btn.textContent = '📋 複製全部', 2000);
}

function downloadTxt() {
  const text = resultText.textContent;
  if (!text) return;
  const a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob([text], { type: 'text/plain;charset=utf-8' }));
  a.download = (currentFile?.name?.replace(/\.[^.]+$/, '') || 'ocr_result') + '.txt';
  a.click();
}

async function openCamera() {
  try {
    cameraStream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } });
    document.getElementById('camera-video').srcObject = cameraStream;
    document.getElementById('camera-modal').classList.add('open');
  } catch { alert('無法存取相機，請確認已授予相機權限'); }
}
function closeCamera() {
  if (cameraStream) { cameraStream.getTracks().forEach(t => t.stop()); cameraStream = null; }
  document.getElementById('camera-modal').classList.remove('open');
}
function takePhoto() {
  const video = document.getElementById('camera-video');
  const canvas = document.getElementById('canvas');
  canvas.width = video.videoWidth; canvas.height = video.videoHeight;
  canvas.getContext('2d').drawImage(video, 0, 0);
  canvas.toBlob(blob => { closeCamera(); handleFile(new File([blob], 'photo.jpg', { type: 'image/jpeg' })); }, 'image/jpeg', 0.95);
}
</script>
</body>
</html>
