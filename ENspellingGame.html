<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>比賽計分板</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Arial', sans-serif;
            background-color: #000; /* 改為純黑背景，更像電子計分板 */
            color: white;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
            user-select: none; 
        }

        /* 上半部：計時器 */
        #top-section {
            flex: 0.8;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background-color: #111;
            border-bottom: 2px solid #333;
            padding-top: 10px;
        }

        #timer {
            font-size: 12vw;
            font-weight: bold;
            color: #FFD700;
            line-height: 1;
            margin-bottom: 15px;
            font-variant-numeric: tabular-nums;
            text-shadow: 0 0 15px rgba(255, 215, 0, 0.3);
        }

        .timer-controls button {
            font-size: 1.8vw;
            padding: 10px 25px;
            margin: 0 5px;
            cursor: pointer;
            border: 1px solid #555;
            border-radius: 8px;
            background-color: #222;
            color: white;
            transition: 0.2s;
        }
        .timer-controls button:hover { background-color: #444; }
        .timer-controls button:active { background-color: #666; }

        /* 下半部：計分板 */
        #bottom-section {
            flex: 2;
            display: flex;
            width: 100%;
        }

        .team {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 20px;
            position: relative;
        }

        #red-team { background-color: #b30000; } /* 鮮明暗紅 */
        #blue-team { background-color: #0033cc; border-left: 2px solid #111;} /* 鮮明暗藍 */

        /* 可編輯的隊名輸入框 */
        .team-name-input {
            background: transparent;
            border: none;
            border-bottom: 2px dashed rgba(255,255,255,0.4); /* 虛線提示可點擊 */
            color: white;
            font-size: 6vw;
            font-weight: bold;
            text-align: center;
            width: 70%;
            margin-bottom: 10px;
            font-family: inherit;
            text-shadow: 2px 2px 5px rgba(0,0,0,0.5);
            transition: 0.3s;
        }
        
        .team-name-input:focus {
            outline: none;
            border-bottom: 2px solid white;
            background: rgba(0,0,0,0.2); /* 點擊輸入時背景微暗 */
        }

        .score {
            font-size: 25vw; /* 分數數字放更大 */
            font-weight: bold;
            line-height: 1;
            margin-bottom: 20px;
            text-shadow: 0 0 20px rgba(0,0,0,0.8);
        }

        .score-controls {
            display: flex;
            gap: 20px;
        }

        .score-controls button {
            font-size: 4vw;
            width: 8vw;
            height: 8vw;
            border-radius: 50%;
            border: 2px solid rgba(255,255,255,0.2);
            cursor: pointer;
            font-weight: bold;
            box-shadow: 0 5px 15px rgba(0,0,0,0.5);
            transition: transform 0.1s, background-color 0.2s;
        }

        .score-controls button:active {
            transform: scale(0.9);
        }

        /* 加減分按鈕顏色 (融入背景色系) */
        .btn-plus { background-color: rgba(255,255,255,0.2); color: white; }
        .btn-plus:hover { background-color: rgba(255,255,255,0.4); }
        .btn-minus { background-color: rgba(0,0,0,0.3); color: #ccc; }
        .btn-minus:hover { background-color: rgba(0,0,0,0.5); color: white; }

    </style>
</head>
<body>

    <div id="top-section">
        <div id="timer">20</div>
        <div class="timer-controls">
            <button onclick="startTimer()">▶ 開始</button>
            <button onclick="pauseTimer()">⏸ 暫停</button>
            <button onclick="resetTimer()">🔄 重置 20 秒</button>
            <button onclick="resetScores()">🗑 分數歸零</button>
        </div>
    </div>

    <div id="bottom-section">
        <div class="team" id="red-team">
            <input type="text" class="team-name-input" value="紅 隊" maxlength="8">
            <div class="score" id="red-score">0</div>
            <div class="score-controls">
                <button class="btn-minus" onclick="changeScore('red', -1)">-1</button>
                <button class="btn-plus" onclick="changeScore('red', 1)">+1</button>
            </div>
        </div>

        <div class="team" id="blue-team">
            <input type="text" class="team-name-input" value="藍 隊" maxlength="8">
            <div class="score" id="blue-score">0</div>
            <div class="score-controls">
                <button class="btn-minus" onclick="changeScore('blue', -1)">-1</button>
                <button class="btn-plus" onclick="changeScore('blue', 1)">+1</button>
            </div>
        </div>
    </div>

    <script>
        // --- 分數控制 ---
        let redScore = 0;
        let blueScore = 0;

        function changeScore(team, amount) {
            if (team === 'red') {
                redScore += amount;
                if (redScore < 0) redScore = 0;
                document.getElementById('red-score').innerText = redScore;
            } else if (team === 'blue') {
                blueScore += amount;
                if (blueScore < 0) blueScore = 0;
                document.getElementById('blue-score').innerText = blueScore;
            }
        }

        function resetScores() {
            if(confirm('確定要將雙方分數歸零嗎？')) {
                redScore = 0;
                blueScore = 0;
                document.getElementById('red-score').innerText = redScore;
                document.getElementById('blue-score').innerText = blueScore;
            }
        }

        // --- 計時器控制 ---
        const DEFAULT_TIME = 20;
        let timeLeft = DEFAULT_TIME;
        let timerInterval = null;
        let isRunning = false;

        function updateTimerDisplay() {
            document.getElementById('timer').innerText = timeLeft;
            if(timeLeft <= 5 && timeLeft > 0) {
                document.getElementById('timer').style.color = '#ff6666'; 
            } else if (timeLeft === 0) {
                document.getElementById('timer').style.color = '#ff0000'; 
            } else {
                document.getElementById('timer').style.color = '#FFD700'; 
            }
        }

        function startTimer() {
            if (isRunning || timeLeft === 0) return; 
            isRunning = true;
            
            initAudio(); 

            timerInterval = setInterval(() => {
                timeLeft--;
                updateTimerDisplay();

                if (timeLeft <= 0) {
                    clearInterval(timerInterval);
                    isRunning = false;
                    playBuzzer(); 
                }
            }, 1000);
        }

        function pauseTimer() {
            clearInterval(timerInterval);
            isRunning = false;
        }

        function resetTimer() {
            pauseTimer();
            timeLeft = DEFAULT_TIME;
            updateTimerDisplay();
        }

        // --- 聲音產生器 (Web Audio API) ---
        let audioCtx;
        function initAudio() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            }
        }

        function playBuzzer() {
            if (!audioCtx) initAudio();
            
            const oscillator = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();
            
            oscillator.connect(gainNode);
            gainNode.connect(audioCtx.destination);
            
            oscillator.type = 'square';
            oscillator.frequency.value = 450; // 微調音高
            
            gainNode.gain.setValueAtTime(0.5, audioCtx.currentTime);
            gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 1.5);
            
            oscillator.start();
            oscillator.stop(audioCtx.currentTime + 1.5); 
        }
    </script>
</body>
</html>
