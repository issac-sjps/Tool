<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>教室狀態</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@900&family=Noto+Sans+TC:wght@300;400&display=swap" rel="stylesheet">
  <style>
    :root {
      --gold: #d4a84b;
      --ink:  #1a1008;
      --cream:#fdf6ec;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background-color: var(--ink);
      overflow: hidden;
      font-family: 'Noto Sans TC', sans-serif;
      gap: 2.8rem;
    }

    /* grain */
    body::before {
      content: '';
      position: fixed; inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='1'/%3E%3C/svg%3E");
      opacity: 0.04; pointer-events: none; z-index: 0;
    }

    /* ambient glow */
    .glow {
      position: fixed; inset: 0; pointer-events: none; z-index: 0;
      transition: background 0.7s ease;
    }

    /* ── Card ── */
    .card {
      position: relative; z-index: 1;
      background: var(--cream);
      border: 4px solid var(--gold);
      box-shadow:
        0 0 0 10px var(--ink),
        0 0 0 12px var(--gold),
        0 40px 100px rgba(0,0,0,0.75);
      padding: 3.5rem 6rem 4rem;
      text-align: center;
      max-width: 820px;
      width: 92vw;
      min-height: 300px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      user-select: none;
      animation: cardIn 0.9s cubic-bezier(0.16,1,0.3,1) both;
    }
    .card:hover { filter: brightness(1.03); }

    @keyframes cardIn {
      from { opacity: 0; transform: translateY(32px) scale(0.96); }
      to   { opacity: 1; transform: translateY(0)    scale(1);    }
    }

    .corner {
      position: absolute; font-size: 1.1rem;
      color: var(--gold); opacity: 0.7;
    }
    .corner.tl { top: 0.7rem; left: 1rem; }
    .corner.br { bottom: 0.7rem; right: 1rem; transform: rotate(180deg); }

    /* status */
    .status-row {
      display: flex; align-items: center; justify-content: center;
      gap: 0.55rem; margin-bottom: 1.6rem;
    }
    .dot {
      width: 11px; height: 11px; border-radius: 50%;
      transition: background 0.5s;
    }
    .status-label {
      font-size: 0.75rem; letter-spacing: 0.28em;
      font-weight: 400; transition: color 0.5s;
    }

    /* divider */
    .divider {
      display: flex; align-items: center; gap: 0.8rem;
      width: 100%; margin-bottom: 1.8rem;
    }
    .divider::before, .divider::after {
      content: ''; flex: 1; height: 1px;
      background: linear-gradient(to right, transparent, var(--gold), transparent);
    }
    .divider span { font-size: 1rem; color: var(--gold); }

    /* main title */
    .main-title {
      font-family: 'Noto Serif TC', serif;
      font-weight: 900;
      line-height: 1.05;
      letter-spacing: 0.05em;
      transition: opacity 0.3s ease, transform 0.3s ease, color 0.5s, text-shadow 0.5s;
      display: grid;
      justify-items: center;
    }
    /* 3-char: single row */
    .main-title.chars-3 {
      grid-template-columns: repeat(3, 1fr);
      font-size: clamp(5rem, 16vw, 9.5rem);
    }
    /* 4-char: 2×2 */
    .main-title.chars-4 {
      grid-template-columns: repeat(2, 1fr);
      font-size: clamp(4.5rem, 14vw, 9rem);
    }
    .main-title span { display: block; }
    .main-title.fade-out { opacity: 0; transform: scale(0.88); }

    /* ── Buttons ── */
    .btn-row {
      position: relative; z-index: 1;
      display: flex; gap: 1rem; flex-wrap: wrap; justify-content: center;
    }
    .btn {
      font-family: 'Noto Serif TC', serif;
      font-weight: 700; font-size: 1.05rem;
      letter-spacing: 0.12em;
      padding: 0.65rem 2rem;
      border: 2px solid var(--gold);
      background: transparent; color: var(--gold);
      cursor: pointer;
      transition: background 0.2s, color 0.2s;
    }
    .btn:hover, .btn.active {
      background: var(--gold); color: var(--ink);
    }

    .hint {
      position: relative; z-index: 1;
      font-size: 0.7rem; letter-spacing: 0.2em;
      color: rgba(212,168,75,0.32);
    }
  </style>
</head>
<body>

  <div class="glow" id="glow"></div>

  <div class="card" id="card" onclick="switchCard()">
    <span class="corner tl">❧</span>
    <span class="corner br">❧</span>

    <div class="status-row">
      <span class="dot" id="dot"></span>
      <span class="status-label" id="statusLabel"></span>
    </div>

    <div class="divider"><span>✦</span></div>

    <div class="main-title" id="mainTitle"></div>
  </div>

  <div class="btn-row" id="btnRow"></div>

  <div class="hint">點擊卡片或按鈕切換</div>

  <script>
    const cards = [
      {
        text:  '上課中',
        label: '● CLASS IN SESSION',
        dotColor:   '#c0392b',
        dotGlow:    'rgba(192,57,43,{o})',
        textColor:  '#922b21',
        textShadow: '2px 2px 0 rgba(0,0,0,0.1), 0 4px 28px rgba(192,57,43,0.22)',
        labelColor: '#c0392b',
        glow: 'radial-gradient(ellipse 60% 50% at 50% 50%, rgba(192,57,43,0.18) 0%, transparent 70%)',
      },
      {
        text:  '電腦機房',
        label: '● COMPUTER LAB',
        dotColor:   '#4a90d9',
        dotGlow:    'rgba(74,144,217,{o})',
        textColor:  '#122840',
        textShadow: '2px 2px 0 rgba(0,0,0,0.1), 0 4px 28px rgba(26,58,92,0.3)',
        labelColor: '#4a90d9',
        glow: 'radial-gradient(ellipse 60% 50% at 50% 50%, rgba(26,58,92,0.38) 0%, transparent 70%)',
      },
      {
        text:  '校外研習',
        label: '● FIELD STUDY',
        dotColor:   '#2e7d4f',
        dotGlow:    'rgba(46,125,79,{o})',
        textColor:  '#1a4a2e',
        textShadow: '2px 2px 0 rgba(0,0,0,0.1), 0 4px 28px rgba(46,125,79,0.25)',
        labelColor: '#2e7d4f',
        glow: 'radial-gradient(ellipse 60% 50% at 50% 50%, rgba(46,125,79,0.22) 0%, transparent 70%)',
      },
    ];

    let current = 0;
    let pulseAnim = null;

    const titleEl  = document.getElementById('mainTitle');
    const labelEl  = document.getElementById('statusLabel');
    const dotEl    = document.getElementById('dot');
    const glowEl   = document.getElementById('glow');
    const btnRow   = document.getElementById('btnRow');

    // Build buttons
    const btns = cards.map((c, i) => {
      const b = document.createElement('button');
      b.className = 'btn' + (i === 0 ? ' active' : '');
      b.textContent = c.text;
      b.onclick = (e) => { e.stopPropagation(); setCard(i); };
      btnRow.appendChild(b);
      return b;
    });

    function applyCard(idx) {
      const c = cards[idx];
      // Render each char as a span, set grid class by length
      titleEl.innerHTML = [...c.text].map(ch => `<span>${ch}</span>`).join('');
      titleEl.className = 'main-title chars-' + c.text.length;
      labelEl.textContent  = c.label;
      labelEl.style.color  = c.labelColor;
      dotEl.style.background = c.dotColor;
      titleEl.style.color      = c.textColor;
      titleEl.style.textShadow = c.textShadow;
      glowEl.style.background  = c.glow;

      // pulsing dot via JS animation
      if (pulseAnim) cancelAnimationFrame(pulseAnim);
      let t = 0;
      function pulseTick() {
        t += 0.02;
        const s = (Math.sin(t * Math.PI) + 1) / 2; // 0→1→0
        const size = s * 9;
        dotEl.style.boxShadow = `0 0 0 ${size}px ${c.dotGlow.replace('{o}', (0.5 - s * 0.5).toFixed(2))}`;
        pulseAnim = requestAnimationFrame(pulseTick);
      }
      pulseTick();

      btns.forEach((b, i) => b.classList.toggle('active', i === idx));
    }

    function setCard(idx) {
      if (idx === current) return;
      current = idx;
      titleEl.classList.add('fade-out');
      setTimeout(() => {
        applyCard(idx);
        // fade-out was removed inside applyCard via className reset, re-check
      }, 280);
    }

    function switchCard() {
      setCard((current + 1) % cards.length);
    }

    // Init
    applyCard(0);
  </script>
</body>
</html>
