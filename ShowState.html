<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>上課中 ／ 電腦機房</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;700;900&family=Noto+Sans+TC:wght@300;400&display=swap" rel="stylesheet">
  <style>
    :root {
      --red:    #c0392b;
      --red-dk: #922b21;
      --gold:   #d4a84b;
      --cream:  #fdf6ec;
      --ink:    #1a1008;
      --blue-dk:#122840;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background-color: var(--ink);
      overflow: hidden;
      font-family: 'Noto Sans TC', sans-serif;
      gap: 2.4rem;
    }

    /* grain */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='1'/%3E%3C/svg%3E");
      opacity: 0.04;
      pointer-events: none;
      z-index: 0;
    }

    /* ambient glow */
    .glow {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
      background: radial-gradient(ellipse 60% 50% at 50% 50%, rgba(192,57,43,0.18) 0%, transparent 70%);
      transition: background 0.7s ease;
    }
    .glow.blue {
      background: radial-gradient(ellipse 60% 50% at 50% 50%, rgba(26,58,92,0.35) 0%, transparent 70%);
    }

    /* ── Card ── */
    .card {
      position: relative;
      z-index: 1;
      background: var(--cream);
      border: 4px solid var(--gold);
      box-shadow:
        0 0 0 8px var(--ink),
        0 0 0 10px var(--gold),
        0 30px 80px rgba(0,0,0,0.7);
      padding: 3.5rem 5rem;
      text-align: center;
      max-width: 640px;
      width: 90vw;
      min-height: 260px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      user-select: none;
      animation: cardIn 0.9s cubic-bezier(0.16,1,0.3,1) both;
    }
    .card:hover { filter: brightness(1.03); }

    @keyframes cardIn {
      from { opacity: 0; transform: translateY(32px) scale(0.96); }
      to   { opacity: 1; transform: translateY(0)    scale(1);    }
    }

    .corner {
      position: absolute;
      font-size: 1.1rem;
      color: var(--gold);
      opacity: 0.7;
    }
    .corner.tl { top: 0.6rem; left: 0.9rem; }
    .corner.br { bottom: 0.6rem; right: 0.9rem; transform: rotate(180deg); }

    /* ── Status row ── */
    .status-row {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.55rem;
      margin-bottom: 1.8rem;
    }
    .dot {
      width: 10px; height: 10px;
      border-radius: 50%;
      background: var(--red);
      animation: pulse-red 1.8s ease-in-out infinite;
      transition: background 0.5s;
    }
    .dot.blue-dot {
      background: #4a90d9;
      animation: pulse-blue 1.8s ease-in-out infinite;
    }
    @keyframes pulse-red {
      0%,100% { box-shadow: 0 0 0 0   rgba(192,57,43,0.5); }
      50%      { box-shadow: 0 0 0 8px rgba(192,57,43,0);   }
    }
    @keyframes pulse-blue {
      0%,100% { box-shadow: 0 0 0 0   rgba(74,144,217,0.5); }
      50%      { box-shadow: 0 0 0 8px rgba(74,144,217,0);   }
    }
    .status-label {
      font-size: 0.72rem;
      letter-spacing: 0.28em;
      color: var(--red);
      font-weight: 400;
      transition: color 0.5s;
    }
    .status-label.blue { color: #4a90d9; }

    /* ── Divider ── */
    .divider {
      display: flex;
      align-items: center;
      gap: 0.8rem;
      width: 100%;
      margin-bottom: 1.8rem;
    }
    .divider::before,
    .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: linear-gradient(to right, transparent, var(--gold), transparent);
    }
    .divider span { font-size: 1rem; color: var(--gold); }

    /* ── Main title ── */
    .main-title {
      font-family: 'Noto Serif TC', serif;
      font-weight: 900;
      font-size: clamp(4rem, 14vw, 7rem);
      line-height: 1;
      color: var(--red-dk);
      letter-spacing: 0.05em;
      text-shadow: 2px 2px 0 rgba(0,0,0,0.1), 0 4px 24px rgba(192,57,43,0.2);
      transition: opacity 0.3s ease, transform 0.3s ease, color 0.5s, text-shadow 0.5s;
    }
    .main-title.blue-text {
      color: var(--blue-dk);
      text-shadow: 2px 2px 0 rgba(0,0,0,0.1), 0 4px 24px rgba(26,58,92,0.3);
    }
    .main-title.fade-out {
      opacity: 0;
      transform: scale(0.9);
    }

    /* ── Buttons ── */
    .btn-row {
      position: relative;
      z-index: 1;
      display: flex;
      gap: 1rem;
    }
    .btn {
      font-family: 'Noto Serif TC', serif;
      font-weight: 700;
      font-size: 1rem;
      letter-spacing: 0.12em;
      padding: 0.6rem 1.8rem;
      border: 2px solid var(--gold);
      background: transparent;
      color: var(--gold);
      cursor: pointer;
      transition: background 0.2s, color 0.2s;
    }
    .btn:hover, .btn.active {
      background: var(--gold);
      color: var(--ink);
    }

    .hint {
      position: relative;
      z-index: 1;
      font-size: 0.7rem;
      letter-spacing: 0.2em;
      color: rgba(212,168,75,0.35);
    }
  </style>
</head>
<body>

  <div class="glow" id="glow"></div>

  <div class="card" id="card" onclick="switchCard()">
    <span class="corner tl">❧</span>
    <span class="corner br">❧</span>

    <div class="status-row">
      <span class="dot" id="dot"></span>
      <span class="status-label" id="statusLabel">CLASS IN SESSION</span>
    </div>

    <div class="divider"><span>✦</span></div>

    <div class="main-title" id="mainTitle">上課中</div>
  </div>

  <div class="btn-row">
    <button class="btn active" id="btn0" onclick="setCard(0)">上課中</button>
    <button class="btn"        id="btn1" onclick="setCard(1)">電腦機房</button>
  </div>

  <div class="hint">點擊卡片或按鈕切換</div>

  <script>
    const cards = [
      { text: '上課中',   label: 'CLASS IN SESSION', blue: false },
      { text: '電腦機房', label: 'COMPUTER LAB',      blue: true  },
    ];
    let current = 0;

    const titleEl = document.getElementById('mainTitle');
    const labelEl = document.getElementById('statusLabel');
    const dotEl   = document.getElementById('dot');
    const glowEl  = document.getElementById('glow');
    const btns    = [document.getElementById('btn0'), document.getElementById('btn1')];

    function setCard(idx) {
      if (idx === current) return;
      current = idx;
      const c = cards[idx];

      titleEl.classList.add('fade-out');

      setTimeout(() => {
        titleEl.textContent = c.text;
        labelEl.textContent = c.label;

        if (c.blue) {
          titleEl.classList.add('blue-text');
          labelEl.classList.add('blue');
          dotEl.classList.add('blue-dot');
          glowEl.classList.add('blue');
        } else {
          titleEl.classList.remove('blue-text');
          labelEl.classList.remove('blue');
          dotEl.classList.remove('blue-dot');
          glowEl.classList.remove('blue');
        }

        titleEl.classList.remove('fade-out');
      }, 300);

      btns.forEach((b, i) => b.classList.toggle('active', i === idx));
    }

    function switchCard() {
      setCard((current + 1) % cards.length);
    }
  </script>
</body>
</html>
